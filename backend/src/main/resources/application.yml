spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:domain_system}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration-sec: ${JWT_ACCESS_EXPIRATION_SEC:1800}
  refresh-token-expiration-sec: ${JWT_REFRESH_EXPIRATION_SEC:172800}

file:
  upload-dir: ${FILE_UPLOAD_DIR:./uploads}

logging:
  level:
    com.classification.domain_system.integration.DataMappingTransformer: DEBUG
